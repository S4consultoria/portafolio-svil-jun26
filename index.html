return(<div style={{textAlign:"center",padding:"16px 8px"}}><div style={{fontSize:11,textTransform:"uppercase",letterSpacing:1.5,color:C.grayL,marginBottom:6,fontWeight:500}}>{label}</div><div style={{fontSize:28,fontWeight:700,color:C.navy}}>{value}</div>{sub&&<div style={{fontSize:13,color:positive===true?C.green:positive===false?C.red:C.gray,marginTop:4,fontWeight:600}}>{sub}</div>}</div>);

function GainBar({label,principal,position,color}){

}
